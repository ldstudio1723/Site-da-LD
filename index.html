<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LD Arte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

    <div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-white/10">

        <!-- Logo Area -->
        <div class="flex justify-center mb-6">
            <div
                class="w-16 h-16 bg-gradient-to-br from-purple-600 to-blue-500 rounded-xl flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-0 transition duration-300">
                <span class="font-bold text-white text-3xl">LD</span>
            </div>
        </div>

        <h2 class="text-3xl font-bold text-center text-white mb-2">Login</h2>
        <p class="text-gray-400 text-center mb-6 text-sm">Área Restrita (Admin/Membros)</p>

        <div class="space-y-4">
            <!-- Username Input -->
            <div class="relative">
                <input type="text" id="login-username"
                    class="w-full p-3 pl-10 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                    placeholder="Username ou Email" required>
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <!-- Password Input -->
            <div class="relative">
                <input type="password" id="login-password"
                    class="w-full p-3 pl-10 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                    placeholder="Senha" required>
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <button onclick="handleLogin()"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 rounded-lg hover:from-blue-500 hover:to-purple-500 transition transform hover:scale-[1.02] shadow-lg">
                Entrar
            </button>
        </div>

        <p id="error-msg" class="text-red-400 text-sm mt-4 text-center hidden"></p>

    </div>

    <!-- Overlay de Carregamento Artístico (Suave) -->
    <div id="login-loader" class="fixed inset-0 bg-gray-900/90 backdrop-blur-xl flex items-center justify-center z-50 hidden transition-opacity duration-700">
        <div class="text-center relative">
            <!-- Efeito de Aguarela / Brilho Orgânico -->
            <div class="absolute inset-0 -m-8 bg-gradient-to-tr from-purple-600/20 via-blue-500/20 to-pink-500/20 rounded-full blur-3xl animate-pulse-slow"></div>
            
            <div class="relative">
                <div class="w-24 h-24 mx-auto mb-6 flex items-center justify-center relative">
                    <!-- Círculos de "Tinta" Suaves -->
                    <div class="absolute inset-0 border-2 border-white/5 rounded-full scale-110"></div>
                    <div class="absolute inset-0 border-t-2 border-indigo-400/40 rounded-full animate-spin-extra-slow"></div>
                    
                    <div class="bg-gradient-to-br from-indigo-600 to-purple-700 w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-500/40 animate-float">
                        <span class="text-white font-bold text-2xl tracking-tighter drop-shadow-lg">LD</span>
                    </div>
                </div>
                <p class="text-indigo-200 text-xs font-light tracking-[0.3em] uppercase opacity-70 animate-fade-pulse">Preparando a Tela...</p>
            </div>
        </div>
    </div>

    <style>
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(3deg); }
            50% { transform: translateY(-10px) rotate(-1deg); }
        }
        @keyframes fade-pulse {
            0%, 100% { opacity: 0.4; letter-spacing: 0.3em; }
            50% { opacity: 1; letter-spacing: 0.4em; }
        }
        @keyframes spin-extra-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
        .animate-float { animation: float 5s ease-in-out infinite; }
        .animate-fade-pulse { animation: fade-pulse 3s ease-in-out infinite; }
        .animate-spin-extra-slow { animation: spin-extra-slow 12s linear infinite; }
    </style>

    <script src="script.js"></script>
</body>

</html>
